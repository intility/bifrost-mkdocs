version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Europe/Oslo"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Europe/Oslo"
    groups:
      python-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      python-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Tracks the vendored Bifrost CSS framework pin in package.json. The
  # sync-vendored-css workflow regenerates the committed CSS on these PRs.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Europe/Oslo"
    groups:
      npm:
        patterns:
          - "*"
