site_name: Bifrost MkDocs
site_description: Intility Bifrost theme plugin for MkDocs Material
site_author: Intility
site_url: https://intility.github.io/bifrost-mkdocs

copyright: Copyright &copy; 2026 Intility

extra:
  version: 0.8.0 # x-release-please-version
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/intility/bifrost-mkdocs

theme:
  name: material
  language: en
  logo: assets/bifrost-logo.svg
  favicon: assets/bifrost-logo.svg
  palette:
    - scheme: light
      primary: &bifrost_theme teal # Options: teal, purple, pink, yellow
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: dark
      primary: *bifrost_theme
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - intility-bifrost
  - search:
      lang: en
  - awesome-nav
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

# Navigation is defined with awesome-nav via .nav.yml files in docs/ and
# docs/showcase/ instead of an explicit nav: block here.
